<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - CleanSweep App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Extra+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&family=Satoshi:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <div class="dashboard-wrapper schedule-wrapper">
        <!-- Schedule Header -->
        <header class="schedule-header">
            <div class="schedule-header-top">
                <a href="dashboard.html" class="back-btn">&larr;</a>
                <div class="schedule-title-area">
                    <h1 class="schedule-title">Schedule</h1>
                    <p class="schedule-subtitle">Home | Building No 33 Flat No 26 B Wing Mani...</p>
                </div>
            </div>

            <!-- Type Tabs -->
            <div class="schedule-tabs">
                <button class="tab-btn">
                    <img src="images/calendar-single.svg" alt="Single"
                        onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23555\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><rect x=\'3\' y=\'4\' width=\'18\' height=\'18\' rx=\'2\' ry=\'2\'></rect><line x1=\'16\' y1=\'2\' x2=\'16\' y2=\'6\'></line><line x1=\'8\' y1=\'2\' x2=\'8\' y2=\'6\'></line><line x1=\'3\' y1=\'10\' x2=\'21\' y2=\'10\'></line></svg>'">
                    <span>Single</span>
                </button>
                <button class="tab-btn active">
                    <img src="images/calendar-multiple.svg" alt="Multiple"
                        onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23e91e63\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><rect x=\'3\' y=\'4\' width=\'18\' height=\'18\' rx=\'2\' ry=\'2\'></rect><line x1=\'16\' y1=\'2\' x2=\'16\' y2=\'6\'></line><line x1=\'8\' y1=\'2\' x2=\'8\' y2=\'6\'></line><line x1=\'3\' y1=\'10\' x2=\'21\' y2=\'10\'></line></svg>'">
                    <span>Multiple</span>
                </button>

            </div>
        </header>

        <!-- Dynamic Calendar Area -->
        <main class="schedule-content">
            <div class="calendar-card">
                <div class="calendar-dates-header">
                    <h4>Dates</h4>
                    <div class="date-pickers">
                        <div class="date-pill active">Select Date</div>
                    </div>
                </div>

                <!-- Days of Week -->
                <div class="calendar-days-row">
                    <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
                </div>

                <!-- Custom Grid Calendar -->
                <div class="calendar-month">
                    <h5 class="month-title">March</h5>
                    <div class="calendar-grid">
                        <div class="cal-cell empty"></div>
                        <div class="cal-cell empty"></div>
                        <div class="cal-cell empty"></div>
                        <div class="cal-cell today"><span>Today</span>6</div>
                        <div class="cal-cell">7</div>
                        <div class="cal-cell">8</div>

                        <div class="cal-cell">9</div>
                        <div class="cal-cell">10</div>
                        <div class="cal-cell">11</div>
                        <div class="cal-cell">12</div>
                        <div class="cal-cell">13</div>
                        <div class="cal-cell">14</div>
                        <div class="cal-cell">15</div>

                        <div class="cal-cell">16</div>
                        <div class="cal-cell">17</div>
                        <div class="cal-cell">18</div>
                        <div class="cal-cell">19</div>
                        <div class="cal-cell">20</div>
                        <div class="cal-cell">21</div>
                        <div class="cal-cell">22</div>

                        <div class="cal-cell">23</div>
                        <div class="cal-cell">24</div>
                        <div class="cal-cell">25</div>
                        <div class="cal-cell">26</div>
                        <div class="cal-cell">27</div>
                        <div class="cal-cell">28</div>
                        <div class="cal-cell">29</div>

                        <div class="cal-cell">30</div>
                        <div class="cal-cell">31</div>
                        <div class="cal-cell empty"></div>
                        <div class="cal-cell empty"></div>
                        <div class="cal-cell empty"></div>
                        <div class="cal-cell empty"></div>
                        <div class="cal-cell empty"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Floating Bottom Bar -->
        <div class="pay-bottom-bar" style="justify-content: center;">
            <a href="services.html" class="pay-now-btn continue-btn"
                style="text-decoration: none; text-align: center; width: 100%; max-width: 400px; display: block; box-sizing: border-box;">Proceed
                to Book Services &rarr;</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // State
            let selectionMode = 'multiple'; // 'single' or 'multiple'
            let selectedDates = []; // store selected dates
            const maxMultipleDates = 5;

            // Elements
            const tabs = document.querySelectorAll('.tab-btn');
            const calCells = document.querySelectorAll('.cal-cell:not(.empty)');
            const continueBtn = document.querySelector('.continue-btn');

            // Tab switching logic
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    // Update mode based on text content
                    selectionMode = tab.textContent.trim().toLowerCase();

                    // Reset selections on tab switch
                    selectedDates = [];
                    updateCalendarUI();
                    checkPayButton();
                });
            });

            // Date selection logic
            calCells.forEach(cell => {
                cell.addEventListener('click', () => {
                    // Get date value (handling the 'today' span gracefully if present)
                    const dateText = cell.childNodes.length > 1 ? cell.childNodes[1].textContent.trim() : cell.textContent.trim();
                    const dateValue = parseInt(dateText, 10);

                    if (selectionMode === 'single') {
                        // Single Mode: just replace selection
                        selectedDates = [dateValue];
                    } else {
                        // Multiple Mode: toggle selection
                        const index = selectedDates.indexOf(dateValue);
                        if (index > -1) {
                            // Deselect if already selected
                            selectedDates.splice(index, 1);
                        } else {
                            // Select if under max limit
                            if (selectedDates.length < maxMultipleDates) {
                                selectedDates.push(dateValue);
                            } else {
                                // Optional: Could trigger a toast notification here
                                showToast('Maximum 5 dates can be selected at once', 'info');
                            }
                        }
                    }

                    updateCalendarUI();
                    checkPayButton();
                });
            });

            function updateCalendarUI() {
                calCells.forEach(c => {
                    const cText = c.childNodes.length > 1 ? c.childNodes[1].textContent.trim() : c.textContent.trim();
                    const cVal = parseInt(cText, 10);

                    if (selectedDates.includes(cVal)) {
                        c.style.background = 'var(--pink)';
                        c.style.color = '#fff';
                        c.style.borderColor = 'var(--pink)';
                    } else {
                        // Reset inline styles to let external CSS handle appearance
                        c.style.background = '';
                        c.style.color = '';
                        c.style.borderColor = '';
                    }
                });
            }

            function checkPayButton() {
                let isValid = false;
                if (selectionMode === 'single') {
                    isValid = selectedDates.length === 1;
                } else {
                    isValid = selectedDates.length >= 2;
                }

                if (isValid) {
                    continueBtn.classList.add('ready');
                    continueBtn.style.opacity = '1';
                    continueBtn.style.pointerEvents = 'auto';
                } else {
                    continueBtn.classList.remove('ready');
                    continueBtn.style.opacity = '0.5';
                    continueBtn.style.pointerEvents = 'none';
                }
            }

            // Initial Check
            checkPayButton();

            // Store selection before navigation
            continueBtn.addEventListener('click', (e) => {
                if (continueBtn.classList.contains('ready')) {
                    // Sort dates just in case
                    const sortedDates = [...selectedDates].sort((a, b) => a - b);
                    sessionStorage.setItem('cs_selectedDates', JSON.stringify(sortedDates));
                    sessionStorage.setItem('cs_selectionMode', selectionMode);
                } else {
                    e.preventDefault();
                }
            });
        });

        // Basic Toast function if toast.js isn't loaded globally here
        function showToast(message, type = 'info') {
            if (typeof window.showToast === 'function') {
                window.showToast(message, type);
            } else {
                alert(message);
            }
        }
    </script>
</body>

</html>
