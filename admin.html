<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CleanSweep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Extra+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&family=Satoshi:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Passcode Gate (runs instantly before page renders) -->
    <script>
        const pass = prompt('Enter Admin Passcode:');
        if (pass !== 'admin123') {
            window.location.href = 'index.html';
        }
    </script>
    <style>
        /* Admin specific variables */
        :root {
            --admin-bg: #f4f6f9;
            --admin-sidebar: #1a1c23;
            --admin-text-light: #a0a5b1;
            --admin-accent: #3b82f6;
            /* Blue instead of pink for admin distinction */
            --admin-white: #ffffff;
            --font-heading: 'Sofia Sans Extra Condensed', sans-serif;
            --font-body: 'Satoshi', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
        }

        body {
            background-color: var(--admin-bg);
            color: #333;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: var(--admin-sidebar);
            color: var(--admin-white);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }

        .sidebar-brand {
            padding: 24px 20px;
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .sidebar-brand span {
            color: var(--admin-accent);
        }

        .nav-item {
            padding: 16px 24px;
            color: var(--admin-text-light);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--admin-white);
            background-color: rgba(255, 255, 255, 0.05);
            border-left-color: var(--admin-accent);
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 24px;
            font-size: 0.8rem;
            color: var(--admin-text-light);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 250px;
            padding: 40px;
            max-width: 1200px;
        }

        .page-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .page-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 800;
            color: #1a1c23;
            text-transform: uppercase;
        }

        .page-subtitle {
            color: #6b7280;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--admin-white);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-bottom: 4px solid var(--admin-accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: var(--font-heading);
            font-size: 2.8rem;
            font-weight: 900;
            color: #111827;
            line-height: 1;
        }

        /* Two Column Layout */
        .dashboard-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .dashboard-panel {
            background: var(--admin-white);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f3f4f6;
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #111827;
        }

        /* Table */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid #f3f4f6;
        }

        th {
            background: #f9fafb;
            color: #4b5563;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            font-size: 0.9rem;
            color: #374151;
        }

        .order-id {
            font-weight: 600;
            color: var(--admin-accent);
        }

        .service-tags {
            font-size: 0.8rem;
            color: #6b7280;
        }

        /* Custom Status Dropdown */
        .status-select {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid transparent;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            background-color: #f3f4f6;
            color: #374151;
            transition: all 0.2s;
        }

        .status-select:hover {
            border-color: #d1d5db;
        }

        .status-confirmed {
            background-color: #e0f2fe;
            color: #0284c7;
        }

        .status-completed {
            background-color: #dcfce7;
            color: #166534;
        }

        .status-cancelled {
            background-color: #fee2e2;
            color: #991b1b;
        }

        /* Pure CSS Bar Chart */
        .chart-container {
            padding: 24px;
        }

        .bar-item {
            margin-bottom: 20px;
            position: relative;
        }

        .bar-item:last-child {
            margin-bottom: 0;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
        }

        .bar-track {
            height: 12px;
            background: #f3f4f6;
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, var(--admin-accent));
            border-radius: 6px;
            width: 0%;
            /* Set via JS styled attribute */
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #6b7280;
        }

        @media (max-width: 1024px) {
            .dashboard-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">Clean<span>Admin</span></div>
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="index.html" class="nav-item" style="margin-top: auto;">← Exit Admin</a>
        <div class="sidebar-footer">Admin Gateway v1.0</div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Overview</h1>
                <p class="page-subtitle">Real-time CleanSweep operations data</p>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Bookings</div>
                <div class="stat-value" id="stat-bookings">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-value" id="stat-revenue">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Order Value</div>
                <div class="stat-value" id="stat-aov">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Top Service</div>
                <div class="stat-value" id="stat-top" style="font-size: 1.8rem; line-height: 1.2; padding-top: 10px;">-
                </div>
            </div>
        </div>

        <!-- Panels -->
        <div class="dashboard-row">
            <!-- Table Panel -->
            <div class="dashboard-panel">
                <div class="panel-header">Recent Orders</div>
                <div class="table-responsive" id="table-container">
                    <!-- Table injected by JS -->
                </div>
            </div>

            <!-- Chart Panel -->
            <div class="dashboard-panel">
                <div class="panel-header">Popular Services</div>
                <div class="chart-container" id="chart-container">
                    <!-- Chart injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="toast.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawOrders = JSON.parse(localStorage.getItem('cs_orders') || '[]');

            function renderDashboard() {
                if (rawOrders.length === 0) {
                    renderEmpty();
                    return;
                }

                // Calculate Stats
                const totalBookings = rawOrders.length;
                let totalRevenue = 0;
                const serviceCounts = {};

                rawOrders.forEach(order => {
                    totalRevenue += order.total;
                    order.services.forEach(s => {
                        serviceCounts[s] = (serviceCounts[s] || 0) + 1;
                    });
                });

                const aov = Math.round(totalRevenue / totalBookings);

                // Find top service
                let maxCount = 0;
                let topService = '-';
                for (const [s, count] of Object.entries(serviceCounts)) {
                    if (count > maxCount) {
                        maxCount = count;
                        topService = s;
                    }
                }

                // Animate numbers
                animateValue('stat-bookings', 0, totalBookings, 1000, '');
                animateValue('stat-revenue', 0, totalRevenue, 1000, '₹');
                animateValue('stat-aov', 0, aov, 1000, '₹');
                document.getElementById('stat-top').textContent = topService;

                // Render Table
                renderTable();

                // Render Chart
                renderChart(serviceCounts, maxCount);
            }

            function renderEmpty() {
                document.getElementById('table-container').innerHTML = '<div class="empty-state">No orders have been placed yet.</div>';
                document.getElementById('chart-container').innerHTML = '<div class="empty-state">Not enough data.</div>';
            }

            function animateValue(id, start, end, duration, prefix) {
                const obj = document.getElementById(id);
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = prefix + Math.floor(progress * (end - start) + start).toLocaleString('en-IN');
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }

            function renderTable() {
                // Show newest first
                const orders = [...rawOrders].reverse();

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Date & Time</th>
                                <th>Services</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                orders.forEach(order => {
                    const statusClass = `status-${order.status.toLowerCase().replace(/\s+/g, '-')}`;
                    const servicesText = order.services.join(', ');

                    html += `
                        <tr>
                            <td class="order-id">${order.id}</td>
                            <td>${order.date || 'N/A'}<br><span style="font-size:0.75rem;color:#9ca3af">${order.time || ''}</span></td>
                            <td><div class="service-tags">${servicesText}</div></td>
                            <td style="font-weight:700">₹${order.total.toLocaleString()}</td>
                            <td>
                                <select class="status-select ${statusClass}" onchange="updateOrderStatus('${order.id}', this)">
                                    <option value="Confirmed" ${order.status === 'Confirmed' ? 'selected' : ''}>Confirmed</option>
                                    <option value="On The Way" ${order.status === 'On The Way' ? 'selected' : ''}>On The Way</option>
                                    <option value="Completed" ${order.status === 'Completed' ? 'selected' : ''}>Completed</option>
                                    <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                document.getElementById('table-container').innerHTML = html;
            }

            function renderChart(counts, maxCount) {
                // Sort by count descending
                const sortedServices = Object.entries(counts).sort((a, b) => b[1] - a[1]);
                // Take top 5
                const top5 = sortedServices.slice(0, 5);

                let html = '';
                top5.forEach(([service, count]) => {
                    const percent = (count / maxCount) * 100;
                    html += `
                        <div class="bar-item">
                            <div class="bar-label">
                                <span>${service}</span>
                                <span>${count}</span>
                            </div>
                            <div class="bar-track">
                                <div class="bar-fill" style="width: 0%" data-target="${percent}%"></div>
                            </div>
                        </div>
                    `;
                });

                const container = document.getElementById('chart-container');
                container.innerHTML = html;

                // Trigger animation on next frame
                setTimeout(() => {
                    const fills = container.querySelectorAll('.bar-fill');
                    fills.forEach(fill => {
                        fill.style.width = fill.getAttribute('data-target');
                    });
                }, 50);
            }

            // Global updater
            window.updateOrderStatus = (id, selectEl) => {
                const newStatus = selectEl.value;
                const orderIndex = rawOrders.findIndex(o => o.id === id);

                if (orderIndex > -1) {
                    rawOrders[orderIndex].status = newStatus;
                    localStorage.setItem('cs_orders', JSON.stringify(rawOrders));

                    // Update select color class
                    selectEl.className = `status-select status-${newStatus.toLowerCase().replace(/\s+/g, '-')}`;

                    // Optional: show toast, but might be annoying for multiple quick changes
                    // Use console.log or subtle indicator if preferred
                }
            };

            // Init
            renderDashboard();
        });
    </script>
</body>

</html>
