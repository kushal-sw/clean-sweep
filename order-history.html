<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - CleanSweep</title>
    <meta name="description" content="View your CleanSweep booking history and order status.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Extra+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&family=Satoshi:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: var(--light-grey);
            min-height: 100vh;
        }

        .orders-header {
            padding: 120px 20px 40px;
            text-align: center;
        }

        .orders-title {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--maroon-dark);
            letter-spacing: 1px;
        }

        .orders-subtitle {
            color: var(--text-grey);
            font-size: 1rem;
            margin-top: 8px;
        }

        .orders-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* Order Cards */
        .order-card {
            background: var(--white);
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 16px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .order-id-col {
            min-width: 90px;
        }

        .order-id {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--maroon-dark);
            letter-spacing: 0.5px;
        }

        .order-date {
            font-size: 0.8rem;
            color: var(--text-grey);
            margin-top: 4px;
        }

        .order-services {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .order-service-tag {
            background: rgba(233, 30, 123, 0.08);
            color: var(--pink);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .order-total {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-dark);
            min-width: 80px;
            text-align: right;
        }

        .order-status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 90px;
            text-align: center;
        }

        .status-confirmed {
            background: rgba(46, 204, 113, 0.12);
            color: #27ae60;
        }

        .status-completed {
            background: rgba(52, 152, 219, 0.12);
            color: #2980b9;
        }

        .status-cancelled {
            background: rgba(231, 76, 60, 0.12);
            color: #c0392b;
        }

        /* Empty State */
        .orders-empty {
            text-align: center;
            padding: 80px 20px;
        }

        .orders-empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .orders-empty-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 900;
            color: var(--maroon-dark);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .orders-empty-text {
            color: var(--text-grey);
            font-size: 1rem;
            margin-bottom: 28px;
        }

        .orders-empty-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--pink);
            color: var(--white);
            padding: 14px 32px;
            border-radius: 30px;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }

        .orders-empty-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        /* Stats Row */
        .orders-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .orders-stat-card {
            flex: 1;
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
        }

        .stat-value {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 900;
            color: var(--pink);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-grey);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .order-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .order-total {
                text-align: left;
            }

            .orders-stats {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header id="header">
        <nav class="dashboard-navbar">
            <div class="dashboard-nav-side">
                <a href="services.html" class="nav-link">Services</a>
                <a href="order-history.html" class="nav-link nav-orders-link"
                    style="color: var(--pink); font-weight: 700;">Booking History</a>
            </div>

            <div class="dashboard-nav-center">
                <a href="index.html" class="logo">CleanSweep</a>
            </div>

            <div class="dashboard-nav-side right">
                <a href="tracker.html" class="nav-link">Track Order</a>
                <button class="dashboard-nav-btn logout-btn" onclick="logout()">Logout</button>
            </div>
        </nav>
    </header>

    <div class="orders-header">
        <h1 class="orders-title">My Orders</h1>
        <p class="orders-subtitle" id="orders-subtitle"></p>
    </div>

    <div class="orders-container" id="orders-container">
        <!-- Populated by JS -->
    </div>

    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script src="rating.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Protect page — redirect if not logged in
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const container = document.getElementById('orders-container');
            const subtitle = document.getElementById('orders-subtitle');

            // Keep a reference to the plain array to modify and save later
            let rawOrders = JSON.parse(localStorage.getItem('cs_orders') || '[]');

            // Show orders newest first for viewing
            const reversedOrders = [...rawOrders].reverse();

            if (reversedOrders.length === 0) {
                subtitle.textContent = 'No bookings yet';
                container.innerHTML = `
                    <div class="orders-empty">
                        <div class="orders-empty-icon">📋</div>
                        <h2 class="orders-empty-title">No Orders Yet</h2>
                        <p class="orders-empty-text">You haven't booked any services yet. Start by browsing our services!</p>
                        <a href="services.html" class="orders-empty-btn">Book Your First Service</a>
                    </div>
                `;
                return;
            }

            subtitle.textContent = `${reversedOrders.length} booking${reversedOrders.length > 1 ? 's' : ''}`;

            // Stats
            const totalSpent = reversedOrders.reduce((sum, o) => sum + o.total, 0);
            let html = `
                <div class="orders-stats">
                    <div class="orders-stat-card">
                        <div class="stat-value">${reversedOrders.length}</div>
                        <div class="stat-label">Total Bookings</div>
                    </div>
                    <div class="orders-stat-card">
                        <div class="stat-value">₹${totalSpent.toLocaleString()}</div>
                        <div class="stat-label">Total Spent</div>
                    </div>
                    <div class="orders-stat-card">
                        <div class="stat-value">₹${Math.round(totalSpent / reversedOrders.length)}</div>
                        <div class="stat-label">Avg Order</div>
                    </div>
                </div>
            `;

            // Order cards
            reversedOrders.forEach(order => {
                const statusClass = order.status.toLowerCase().replace(/\s+/g, '-');
                const serviceTags = order.services.map(s => `<span class="order-service-tag">${s}</span>`).join('');

                let orderFooter = '';
                if (order.status.toLowerCase() === 'completed') {
                    if (!order.rated) {
                        orderFooter = `
                            <div class="order-rating-area" id="rating-area-${order.id}" style="width: 100%; margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee;">
                                <button class="rate-now-btn" onclick="showRatingForm('${order.id}')" style="background:none; border:none; color:var(--pink); font-family:var(--font-heading); font-size:1.1rem; font-weight:800; text-transform:uppercase; cursor:pointer;">★ Rate Services</button>
                            </div>
                        `;
                    } else {
                        orderFooter = `
                            <div style="width: 100%; margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee;">
                                <span style="color:var(--text-grey); font-size:0.85rem; font-weight:600;">★ Thanks for rating!</span>
                            </div>
                        `;
                    }
                }

                // Wrap original card content in a flex div, and set outer card to column
                html += `
                    <div class="order-card" style="flex-direction: column; align-items: stretch; gap: 0;">
                        <div style="display: flex; align-items: center; gap: 24px; width: 100%;" class="order-row-mobile">
                            <div class="order-id-col">
                                <div class="order-id">${order.id}</div>
                                <div class="order-date">${order.date || 'N/A'}</div>
                            </div>
                            <div class="order-services">${serviceTags}</div>
                            <div class="order-total">₹${order.total.toLocaleString()}</div>
                            <span class="order-status status-${statusClass}">${order.status}</span>
                        </div>
                        ${orderFooter}
                    </div>
                `;
            });

            container.innerHTML = html;

            // Rating Form Logic
            window.showRatingForm = (orderId) => {
                const orderIndex = rawOrders.findIndex(o => o.id === orderId);
                const order = rawOrders[orderIndex];
                const area = document.getElementById(`rating-area-${orderId}`);

                area.innerHTML = `
                    <div style="font-size:0.95rem; font-weight:700; color:var(--text-dark); margin-bottom:12px">Rate your experience:</div>
                    <div id="stars-container-${orderId}"></div>
                `;

                const starsContainer = document.getElementById(`stars-container-${orderId}`);
                let ratedCount = 0;

                order.services.forEach(service => {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.justifyContent = 'space-between';
                    row.style.alignItems = 'center';
                    row.style.marginBottom = '8px';

                    const name = document.createElement('span');
                    name.style.fontSize = '0.9rem';
                    name.style.color = 'var(--text-grey)';
                    name.textContent = service;

                    const widgetContainer = document.createElement('div');

                    row.appendChild(name);
                    row.appendChild(widgetContainer);
                    starsContainer.appendChild(row);

                    new RatingWidget(widgetContainer, service, (val) => {
                        ratedCount++;
                        if (ratedCount === order.services.length) {
                            // All services in this order have been rated
                            order.rated = true;
                            localStorage.setItem('cs_orders', JSON.stringify(rawOrders));
                            showToast('Thank you for your feedback! 🌟', 'success');
                            setTimeout(() => {
                                area.innerHTML = `<span style="color:var(--text-grey); font-size:0.85rem; font-weight:600;">★ Thanks for rating!</span>`;
                            }, 1000);
                        }
                    });
                });
            };
        });
    </script>
</body>

</html>
