<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services - CleanSweep</title>
    <meta name="description" content="Choose from our range of on-demand home services.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Extra+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&family=Satoshi:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for Services page */
        body {
            background: var(--light-grey);
        }

        .services-page-header {
            padding: 120px 20px 40px;
            text-align: center;
        }

        .services-page-title {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--maroon-dark);
            letter-spacing: 1px;
        }

        .services-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 40px;
            padding: 0 20px 80px;
            align-items: flex-start;
        }

        /* Services Grid */
        .services-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .service-booking-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .service-booking-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .service-booking-img {
            height: 180px;
            background: var(--light-grey);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .service-booking-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .service-booking-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .service-booking-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .service-booking-rate {
            color: var(--pink);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .service-controls {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .time-selector {
            display: flex;
            align-items: center;
            background: var(--light-grey);
            border-radius: 30px;
            padding: 4px 8px;
        }

        .time-btn {
            background: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .time-btn:hover {
            background: var(--pink);
            color: white;
        }

        .time-display {
            width: 40px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .add-service-btn {
            background: var(--maroon-dark);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-service-btn:hover {
            background: var(--pink);
        }

        .add-service-btn.added {
            background: #28a745;
        }

        /* Estimator Sidebar */
        .estimator-sidebar {
            width: 320px;
            background: var(--white);
            border-radius: 20px;
            padding: 24px;
            position: sticky;
            top: 100px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
        }

        .estimator-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--maroon-dark);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light-grey);
            padding-bottom: 12px;
        }

        .selected-services-list {
            min-height: 100px;
            margin-bottom: 20px;
        }

        .empty-cart-msg {
            color: #888;
            font-size: 0.95rem;
            text-align: center;
            padding: 20px 0;
            font-style: italic;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--light-grey);
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .cart-item-time {
            color: #666;
            font-size: 0.85rem;
        }

        .cart-item-price {
            font-weight: 700;
        }

        .estimator-summary {
            background: var(--light-grey);
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed #ddd;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--pink);
        }

        .book-now-btn {
            display: block;
            width: 100%;
            background: var(--maroon-dark);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 30px;
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .book-now-btn:hover {
            background: var(--pink);
        }

        .book-now-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header id="header">
        <nav class="navbar">
            <a href="index.html#services" class="nav-link">Home</a>
            <a href="index.html#how-it-works" class="nav-link">How it works</a>
            <a href="index.html" class="logo">CleanSweep</a>
            <a href="index.html#why-us" class="nav-link">Why us?</a>
            <a href="index.html#faqs" class="nav-link">FAQs</a>
        </nav>
    </header>

    <div class="services-page-header">
        <h1 class="services-page-title">Select Your Services</h1>
    </div>

    <div class="services-container">
        <!-- Services Grid -->
        <div class="services-grid" id="services-grid">
            <!-- Cards will be populated dynamically by JS -->
        </div>

        <!-- Estimator Sidebar -->
        <div class="estimator-sidebar">
            <h2 class="estimator-title">Price Estimator</h2>

            <div class="selected-services-list" id="cart-list">
                <div class="empty-cart-msg">No services selected yet. Add services to estimate price.</div>
            </div>

            <div class="estimator-summary">
                <div class="summary-row">
                    <span>Total Duration:</span>
                    <span id="total-time">0 hrs</span>
                </div>
                <div class="summary-total">
                    <span>Estimated Total:</span>
                    <span id="total-price">₹0</span>
                </div>
            </div>

            <button class="book-now-btn" id="book-btn" disabled>Proceed to Book</button>
        </div>
    </div>

    <script src="priceestimator.js"></script>
</body>

</html>
