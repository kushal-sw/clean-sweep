<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CleanSweep</title>
    <meta name="description" content="Login or create an account to book CleanSweep services.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Extra+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&family=Satoshi:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <header id="header">
        <nav class="navbar">
            <a href="index.html" class="nav-link">Home</a>
            <a href="services.html" class="nav-link">Services</a>
            <a href="index.html" class="logo">CleanSweep</a>
            <a href="index.html#how-it-works" class="nav-link">How it works</a>
            <a href="index.html#faqs" class="nav-link">FAQs</a>
        </nav>
    </header>

    <!-- Auth Page -->
    <main class="auth-page">
        <div class="auth-brand">
            <a href="index.html" class="auth-brand-name">CleanSweep</a>
            <span class="auth-brand-tagline">India's First Quick Service App</span>
        </div>

        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div class="auth-form-wrapper">
                <!-- Login Form -->
                <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)" novalidate>
                    <div class="auth-input-group">
                        <label class="auth-label">Email</label>
                        <input type="email" class="auth-input" id="login-email" placeholder="you@example.com">
                        <span class="error-msg" id="login-email-error"></span>
                    </div>
                    <div class="auth-input-group">
                        <label class="auth-label">Password</label>
                        <input type="password" class="auth-input" id="login-password" placeholder="Enter your password">
                        <span class="error-msg" id="login-password-error"></span>
                    </div>
                    <button type="submit" class="auth-submit">Login</button>
                    <p class="auth-footer">Don't have an account? <a onclick="switchTab('signup')">Sign Up</a></p>
                </form>

                <!-- Signup Form -->
                <form class="auth-form" id="form-signup" onsubmit="handleSignup(event)" novalidate>
                    <div class="auth-input-group">
                        <label class="auth-label">Full Name</label>
                        <input type="text" class="auth-input" id="signup-name" placeholder="John Doe">
                        <span class="error-msg" id="signup-name-error"></span>
                    </div>
                    <div class="auth-input-group">
                        <label class="auth-label">Email</label>
                        <input type="email" class="auth-input" id="signup-email" placeholder="you@example.com">
                        <span class="error-msg" id="signup-email-error"></span>
                    </div>
                    <div class="auth-input-group">
                        <label class="auth-label">Password</label>
                        <input type="password" class="auth-input" id="signup-password" placeholder="Create a password">
                        <span class="error-msg" id="signup-password-error"></span>
                    </div>
                    <div class="auth-input-group">
                        <label class="auth-label">Confirm Password</label>
                        <input type="password" class="auth-input" id="signup-confirm"
                            placeholder="Confirm your password">
                        <span class="error-msg" id="signup-confirm-error"></span>
                    </div>
                    <button type="submit" class="auth-submit">Create Account</button>
                    <p class="auth-footer">Already have an account? <a onclick="switchTab('login')">Login</a></p>
                </form>
            </div>
        </div>
    </main>

    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script>
        // --- Validation Helpers ---
        function setError(id, msg) {
            const el = document.getElementById(id);
            const inputId = id.replace('-error', '');
            const input = document.getElementById(inputId);
            el.textContent = msg;
            el.classList.add('visible');
            if (input) input.classList.add('input-error');
        }
        function clearError(id) {
            const el = document.getElementById(id);
            const inputId = id.replace('-error', '');
            const input = document.getElementById(inputId);
            el.textContent = '';
            el.classList.remove('visible');
            if (input) input.classList.remove('input-error');
        }

        // Clear errors on input
        ['login-email', 'login-password', 'signup-name', 'signup-email', 'signup-password', 'signup-confirm'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', () => clearError(id + '-error'));
        });

        // --- Tab Switching ---
        function switchTab(tab) {
            const loginTab = document.getElementById('tab-login');
            const signupTab = document.getElementById('tab-signup');
            const loginForm = document.getElementById('form-login');
            const signupForm = document.getElementById('form-signup');

            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        }

        // --- Handle Login ---
        function handleLogin(e) {
            e.preventDefault();
            let valid = true;

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                setError('login-email-error', 'Enter a valid email address.');
                valid = false;
            }
            if (!password) {
                setError('login-password-error', 'Password is required.');
                valid = false;
            }
            if (!valid) return;

            const result = login(email, password);
            if (result.success) {
                showToast(result.message, 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
            } else {
                setError('login-password-error', result.message);
            }
        }

        // --- Handle Signup ---
        function handleSignup(e) {
            e.preventDefault();
            let valid = true;

            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (name.length < 3) {
                setError('signup-name-error', 'Name must be at least 3 characters.');
                valid = false;
            }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                setError('signup-email-error', 'Enter a valid email address.');
                valid = false;
            }
            if (password.length < 6) {
                setError('signup-password-error', 'Password must be at least 6 characters.');
                valid = false;
            }
            if (password !== confirm) {
                setError('signup-confirm-error', 'Passwords do not match.');
                valid = false;
            }
            if (!valid) return;

            const result = signUp(name, email, password);
            if (result.success) {
                showToast(result.message, 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
            } else {
                setError('signup-email-error', result.message);
            }
        }

        // Redirect if already logged in
        if (getCurrentUser()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
