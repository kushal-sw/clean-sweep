<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - CleanSweep App</title>
    <meta name="description" content="CleanSweep User Dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Extra+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&family=Satoshi:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <div class="dashboard-wrapper">
        <!-- App Header (Location + Actions) -->
        <header class="app-header">
            <div class="app-header-left">
                <h1 class="app-header-title">Home</h1>
                <p class="app-header-subtitle">Building No 33 Flat No 26 B Wing Mani...</p>
            </div>
            <div class="app-header-right">
                <button class="icon-btn wallet-btn" aria-label="Wallet">
                    <img src="images/wallet-icon.svg" alt="Wallet"
                        onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23e91e63\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><rect x=\'2\' y=\'5\' width=\'20\' height=\'14\' rx=\'2\' ry=\'2\'></rect><line x1=\'2\' y1=\'10\' x2=\'22\' y2=\'10\'></line></svg>'">
                </button>
                <div class="reward-btn-wrapper">
                    <button class="icon-btn reward-btn" aria-label="Rewards">
                        <img src="images/gift-icon.svg" alt="Gift"
                            onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%2327ae60\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><polyline points=\'20 12 20 22 4 22 4 12\'></polyline><rect x=\'2\' y=\'7\' width=\'20\' height=\'5\'></rect><line x1=\'12\' y1=\'22\' x2=\'12\' y2=\'7\'></line><path d=\'M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z\'></path><path d=\'M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z\'></path></svg>'">
                    </button>
                    <span class="reward-badge">₹150</span>
                </div>
                <button class="icon-btn profile-btn" onclick="logout()" aria-label="Profile (Logout)">
                    <img src="images/user-icon.svg" alt="User"
                        onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23333\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\'></path><circle cx=\'12\' cy=\'7\' r=\'4\'></circle></svg>'">
                </button>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="dashboard-content">
            <!-- Cards will go here soon -->
        </main>
    </div>

    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Dashboard specific initialization
        });
    </script>
</body>

</html>
